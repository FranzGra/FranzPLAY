; --------------------------------------------------------------------------
; FranzPLAY - PHP-FPM pool tuning per Raspberry Pi 4 (4 core, 2-4GB RAM)
; --------------------------------------------------------------------------
; pm = ondemand: spawna worker solo quando servono e li uccide se inattivi,
; minimizzando il consumo RAM "a riposo". Su hardware debole è la scelta
; corretta rispetto a "dynamic" che mantiene worker idle inutilmente.
; --------------------------------------------------------------------------

[www]
user = www-data
group = www-data
listen = 9000

pm = ondemand
pm.max_children = 8
pm.process_idle_timeout = 30s
pm.max_requests = 500

; Status path utile per healthcheck e monitoring (esposto solo nella rete docker)
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

; Log degli slow request (>5s) per individuare query lente
request_slowlog_timeout = 5s
slowlog = /proc/self/fd/2

; Catch_workers_output: invia stdout/stderr dei worker al log container
catch_workers_output = yes
decorate_workers_output = no
