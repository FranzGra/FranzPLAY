server {
    listen 80;
    server_name _;

    # Aumento limite upload
    client_max_body_size 20M;

    # Root globale di default
    root /var/www;
    index index.php index.html;

    # --- OTTIMIZZAZIONE: GZIP COMPRESSION ---
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # --- 1. FRONTEND REACT ---
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # --- 2. API BACKEND PHP ---
    # Usiamo il modificatore ^~ per dare priorità massima a questo blocco
    # e impedire che altre regole interferiscano.
    location ^~ /api/ {
        # Strategia ROOT (più sicura di alias):
        # URL: /api/login.php
        # ROOT: /var/www
        # Risultato: /var/www + /api/login.php -> ESATTO!
        root /var/www;

        # Se il file non esiste, errore 404
        try_files $uri $uri/ =404;

        # Gestione PHP
        location ~ \.php$ {
            fastcgi_pass php:9000;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            
            # IMPORTANTE PER IL LOGIN/BAN:
            fastcgi_param REMOTE_ADDR $http_x_forwarded_for; 
        }
    }

    # --- 3. IMMAGINI UTENTI ---
    location /img_utenti/ {
        # Percorso aggiornato che corrisponde al nuovo volume
        alias /var/www/sessioni/immagini_utenti/;
        
        # Opzionale: disabilita cache per vedere subito i cambi immagine
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # --- 4. VIDEO STREAMING (PROTETTO) ---
    # RIMOSSO: location /video/ pubblica.
    # Ora l'accesso deve passare obbligatoriamente da PHP (stream.php).

    # --- 5. STREAMING PROTETTO ---
    location /protected_media/ {
        internal;
        alias /media/video/;
        add_header Cache-Control no-cache;
    }
}