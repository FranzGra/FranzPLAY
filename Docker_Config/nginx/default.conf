# ============================================================================
# FranzPLAY - Nginx Server Configuration (Raspberry Pi optimized)
# ============================================================================
#
# Ottimizzazioni principali:
# - sendfile + tcp_nopush + tcp_nodelay: zero-copy + bassa latenza per streaming
# - aio threads + directio per file video grandi: niente buffering kernel inutile
# - gzip selettivo: NON comprime video/immagini già compressi
# - Range requests abilitate via X-Accel-Redirect (seek video efficiente)
# - real_ip: PHP riceve l'IP reale del client (necessario per ban login)
# - keepalive_timeout breve: meno connessioni mantenute aperte su Raspberry
# ============================================================================

# --- Estrazione IP reale del client (se Nginx è dietro un reverse proxy / LAN) ---
# Su rete LAN privata Docker, accettiamo X-Forwarded-For solo dalle subnet docker.
set_real_ip_from 127.0.0.1;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 192.168.0.0/16;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

server {
    listen 80;
    server_name _;

    # ------------------------------------------------------------------------
    # Limiti & root
    # ------------------------------------------------------------------------
    client_max_body_size 20M;
    root /var/www;
    index index.php index.html;

    # Keepalive contenuti per Raspberry: meno FD aperti, meno RAM consumata.
    keepalive_timeout 30s;
    keepalive_requests 100;

    # ------------------------------------------------------------------------
    # Compressione GZIP — SOLO testo/JSON. Mai video/audio/immagini.
    # ------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/x-javascript
        application/xml application/json
        application/manifest+json image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # ------------------------------------------------------------------------
    # 1. FRONTEND REACT (proxy a Vite dev server)
    # ------------------------------------------------------------------------
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ------------------------------------------------------------------------
    # 2. API BACKEND PHP
    # ------------------------------------------------------------------------
    location ^~ /api/ {
        root /var/www;
        try_files $uri $uri/ =404;

        location ~ \.php$ {
            fastcgi_pass php:9000;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

            # Passa l'IP reale del client al backend PHP (necessario per il ban login).
            # $remote_addr è già normalizzato grazie a real_ip_header sopra.
            fastcgi_param REMOTE_ADDR $remote_addr;

            # Timeout adeguati a streaming/upload: ma non troppo permissivi.
            fastcgi_read_timeout 300s;
            fastcgi_send_timeout 60s;
            fastcgi_connect_timeout 10s;

            # Buffer FastCGI ridotti per Raspberry Pi (default sono troppo grandi).
            fastcgi_buffers 8 16k;
            fastcgi_buffer_size 32k;
            fastcgi_busy_buffers_size 64k;
        }
    }

    # ------------------------------------------------------------------------
    # 3. IMMAGINI UTENTI (avatar, ecc.)
    # ------------------------------------------------------------------------
    location /img_utenti/ {
        alias /App_Data/User_Images/;
        # Cache aggressiva: gli avatar cambiano raramente. Se cambiano,
        # invalidare via querystring (?v=timestamp) lato frontend.
        add_header Cache-Control "public, max-age=86400";
        access_log off;
        try_files $uri =404;
    }

    # ------------------------------------------------------------------------
    # 4. STREAMING PROTETTO (X-Accel-Redirect destination)
    #    PHP autorizza, Nginx serve il file con zero-copy + Range supportato.
    # ------------------------------------------------------------------------
    location /protected_media/ {
        internal;
        alias /media/video/;

        # Hardening client
        add_header X-Content-Type-Options nosniff;
        # Cache estesa Range-friendly: 5min con stale-while-revalidate per
        # rewatch immediato senza ri-passare da PHP. Nginx serve ETag/304 nativi.
        add_header Cache-Control "private, max-age=300, stale-while-revalidate=600";

        # I/O asincrono per non bloccare i worker Nginx durante read sync su
        # file grandi. `directio 4m` bypassa il page cache per file > 4MB
        # (utile su Raspberry con poca RAM: evita di cachare gli ultimi MB
        # di un video da 2GB invece di pagine più "utili").
        aio on;
        directio 4m;
        output_buffers 2 256k;
    }
}
